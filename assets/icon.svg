<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0f1922"/>
    </linearGradient>
    <linearGradient id="webGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#00a846"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#shieldGrad)"/>
  <!-- Shield shape -->
  <path d="M128 38 L198 72 L198 138 C198 180 168 212 128 228 C88 212 58 180 58 138 L58 72 Z"
        fill="none" stroke="url(#webGrad)" stroke-width="6" stroke-linejoin="round"/>
  <!-- Inner shield fill with transparency -->
  <path d="M128 50 L190 80 L190 138 C190 175 163 204 128 218 C93 204 66 175 66 138 L66 80 Z"
        fill="#00c853" fill-opacity="0.1"/>
  <!-- Web/honeycomb pattern inside shield -->
  <!-- Center node -->
  <circle cx="128" cy="130" r="8" fill="#00c853"/>
  <!-- Radial lines from center -->
  <line x1="128" y1="130" x2="128" y2="80" stroke="#00c853" stroke-width="2.5" stroke-opacity="0.8"/>
  <line x1="128" y1="130" x2="170" y2="100" stroke="#00c853" stroke-width="2.5" stroke-opacity="0.8"/>
  <line x1="128" y1="130" x2="170" y2="160" stroke="#00c853" stroke-width="2.5" stroke-opacity="0.8"/>
  <line x1="128" y1="130" x2="128" y2="190" stroke="#00c853" stroke-width="2.5" stroke-opacity="0.8"/>
  <line x1="128" y1="130" x2="86" y2="160" stroke="#00c853" stroke-width="2.5" stroke-opacity="0.8"/>
  <line x1="128" y1="130" x2="86" y2="100" stroke="#00c853" stroke-width="2.5" stroke-opacity="0.8"/>
  <!-- Outer web ring nodes -->
  <circle cx="128" cy="80" r="5" fill="#00c853"/>
  <circle cx="170" cy="100" r="5" fill="#00c853"/>
  <circle cx="170" cy="160" r="5" fill="#00c853"/>
  <circle cx="128" cy="190" r="5" fill="#00c853"/>
  <circle cx="86" cy="160" r="5" fill="#00c853"/>
  <circle cx="86" cy="100" r="5" fill="#00c853"/>
  <!-- Connecting web arcs (outer ring) -->
  <line x1="128" y1="80" x2="170" y2="100" stroke="#00c853" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="170" y1="100" x2="170" y2="160" stroke="#00c853" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="170" y1="160" x2="128" y2="190" stroke="#00c853" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="128" y1="190" x2="86" y2="160" stroke="#00c853" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="86" y1="160" x2="86" y2="100" stroke="#00c853" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="86" y1="100" x2="128" y2="80" stroke="#00c853" stroke-width="1.5" stroke-opacity="0.5"/>
</svg>
