<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="50%" stop-color="#162a3a"/>
      <stop offset="100%" stop-color="#0d2e3a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#00a846"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00c853" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00c853" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1544" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#00c853" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="100" x2="1544" y2="100"/>
    <line x1="0" y1="200" x2="1544" y2="200"/>
    <line x1="0" y1="300" x2="1544" y2="300"/>
    <line x1="0" y1="400" x2="1544" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
    <line x1="1200" y1="0" x2="1200" y2="500"/>
    <line x1="1400" y1="0" x2="1400" y2="500"/>
  </g>

  <!-- Decorative web pattern (left side background) -->
  <g transform="translate(100, 250)" stroke="#00c853" stroke-opacity="0.08" fill="none" stroke-width="1.5">
    <circle r="60"/>
    <circle r="120"/>
    <circle r="180"/>
    <line x1="0" y1="-180" x2="0" y2="180"/>
    <line x1="-180" y1="0" x2="180" y2="0"/>
    <line x1="-127" y1="-127" x2="127" y2="127"/>
    <line x1="-127" y1="127" x2="127" y2="-127"/>
  </g>

  <!-- Decorative web pattern (right side background) -->
  <g transform="translate(1444, 250)" stroke="#00c853" stroke-opacity="0.06" fill="none" stroke-width="1.5">
    <circle r="80"/>
    <circle r="160"/>
    <line x1="0" y1="-160" x2="0" y2="160"/>
    <line x1="-160" y1="0" x2="160" y2="0"/>
    <line x1="-113" y1="-113" x2="113" y2="113"/>
    <line x1="-113" y1="113" x2="113" y2="-113"/>
  </g>

  <!-- Shield icon (left of text) -->
  <g transform="translate(440, 250) scale(1.1)">
    <!-- Shield outline -->
    <path d="M0 -90 L70 -58 L70 10 C70 55 40 85 0 100 C-40 85 -70 55 -70 10 L-70 -58 Z"
          fill="url(#shieldFill)" stroke="#00c853" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- Web inside shield -->
    <circle cx="0" cy="0" r="5" fill="#00c853"/>
    <line x1="0" y1="0" x2="0" y2="-45" stroke="#00c853" stroke-width="2" stroke-opacity="0.7"/>
    <line x1="0" y1="0" x2="38" y2="-22" stroke="#00c853" stroke-width="2" stroke-opacity="0.7"/>
    <line x1="0" y1="0" x2="38" y2="22" stroke="#00c853" stroke-width="2" stroke-opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="50" stroke="#00c853" stroke-width="2" stroke-opacity="0.7"/>
    <line x1="0" y1="0" x2="-38" y2="22" stroke="#00c853" stroke-width="2" stroke-opacity="0.7"/>
    <line x1="0" y1="0" x2="-38" y2="-22" stroke="#00c853" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="0" cy="-45" r="3.5" fill="#00c853"/>
    <circle cx="38" cy="-22" r="3.5" fill="#00c853"/>
    <circle cx="38" cy="22" r="3.5" fill="#00c853"/>
    <circle cx="0" cy="50" r="3.5" fill="#00c853"/>
    <circle cx="-38" cy="22" r="3.5" fill="#00c853"/>
    <circle cx="-38" cy="-22" r="3.5" fill="#00c853"/>
    <!-- Outer web connections -->
    <line x1="0" y1="-45" x2="38" y2="-22" stroke="#00c853" stroke-width="1.2" stroke-opacity="0.4"/>
    <line x1="38" y1="-22" x2="38" y2="22" stroke="#00c853" stroke-width="1.2" stroke-opacity="0.4"/>
    <line x1="38" y1="22" x2="0" y2="50" stroke="#00c853" stroke-width="1.2" stroke-opacity="0.4"/>
    <line x1="0" y1="50" x2="-38" y2="22" stroke="#00c853" stroke-width="1.2" stroke-opacity="0.4"/>
    <line x1="-38" y1="22" x2="-38" y2="-22" stroke="#00c853" stroke-width="1.2" stroke-opacity="0.4"/>
    <line x1="-38" y1="-22" x2="0" y2="-45" stroke="#00c853" stroke-width="1.2" stroke-opacity="0.4"/>
  </g>

  <!-- Main text: WebDecoy -->
  <text x="772" y="220" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="96" font-weight="700" fill="white" letter-spacing="2">
    WebDecoy
  </text>

  <!-- Accent line -->
  <rect x="622" y="248" width="300" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="772" y="310" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="32" font-weight="300" fill="#b0bec5" letter-spacing="4">
    Bot Detection &amp; Protection
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="490" width="1544" height="10" fill="url(#accentGrad)" opacity="0.6"/>
</svg>
